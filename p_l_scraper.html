<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PNEZD Survey, DXF & Cloud Scraper</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 12px; background: #fdfdfd; color: #333; margin: 0; }
        h3 { margin-top: 0; color: #007bc4; font-size: 16px; margin-bottom: 8px; }
        #statusBanner { font-size: 12px; font-weight: bold; padding: 8px; border-radius: 4px; margin-bottom: 12px; background: #eee; color: #333; }
        
        /* Optimized Responsive Config Panel Layout */
        .config-container { background: #f0f4f8; padding: 10px; border-radius: 4px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .config-group { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .config-group label { font-size: 11px; font-weight: bold; color: #34495e; }
        .config-group select, .config-group input { padding: 5px; font-size: 12px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; width: 55%; }
        
        .actions { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
        button { background: #0288d1; color: white; border: none; padding: 8px 6px; cursor: pointer; border-radius: 4px; font-weight: bold; flex: 1; font-size: 11px; min-width: 100px; }
        button:hover { background: #01579b; }
        button.success { background: #2e7d32; }
        button.success:hover { background: #1b5e20; }
        button.cad { background: #e65100; }
        button.cad:hover { background: #b53f00; }
        button.cloud { background: #007bc4; }
        button.cloud:hover { background: #005a91; }
        button.cloud-dxf { background: #bf360c; }
        button.cloud-dxf:hover { background: #870000; }
        
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; font-size: 11px; }
        th { background-color: #f4f4f4; font-weight: bold; }
    </style>
</head>
<body>

    <h3>PNEZD Scraper_4_3</h3>
    <div id="statusBanner">Status: Initializing script engine...</div>
    
    <div class="config-container">
        <div class="config-group">
            <label for="fileNameInput">Output File Name</label>
            <input type="text" id="fileNameInput" value="scraped_layout">
        </div>
        <div class="config-group">
            <label for="unitSelect">Target Unit</label>
            <select id="unitSelect" onchange="handleConfigChange()">
                <option value="mm">Millimeters (mm)</option>
                <option value="m">Meters (m)</option>
                <option value="in">Inches (in)</option>
                <option value="ft">International Feet (ft)</option>
                <option value="usft">US Survey Feet (USft)</option>
            </select>
        </div>
        <div class="config-group">
            <label for="orderSelect">Coordinate Format</label>
            <select id="orderSelect" onchange="handleConfigChange()">
                <option value="NEZ" selected>NEZ (Northing, Easting, Z)</option>
                <option value="ENZ">ENZ (Easting, Northing, Z)</option>
            </select>
        </div>
        <div class="config-group">
            <label for="ptPrefix">Point Prefix</label>
            <input type="text" id="ptPrefix" value="P-" oninput="handleConfigChange()">
        </div>
        <div class="config-group">
            <label for="ptStart">Start ID #</label>
            <input type="number" id="ptStart" value="100" oninput="handleConfigChange()">
        </div>
        <div class="config-group">
            <label for="ptDesc">Fallback Desc</label>
            <input type="text" id="ptDesc" value="Point" oninput="handleConfigChange()">
        </div>
    </div>

    <div class="actions">
        <button id="scrapeBtn" onclick="handleScrapeClick()">Scrape Data</button>
        <button id="exportBtn" class="success" onclick="handleExportClick()">Local CSV</button>
        <button id="exportDxfBtn" class="cad" onclick="handleDxfExportClick()">Local DXF</button>
        <button id="saveCloudCsvBtn" class="cloud" onclick="uploadFileToProject('csv')">Save CSV to Project</button>
        <button id="saveCloudDxfBtn" class="cloud-dxf" onclick="uploadFileToProject('dxf')">Save DXF to Project</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Point ID (P)</th>
                    <th id="thCol1">Northing - Y</th>
                    <th id="thCol2">Easting - X</th>
                    <th id="thCol3">Elevation - Z</th>
                    <th>Description (D)</th>
                </tr>
            </thead>
            <tbody id="pointTableBody">
                <tr><td colspan="5" style="text-align:center; color:#999;">No data scraped yet. Place measurements and click Scrape.</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let rawScrapedData = []; 
        let rawScrapedLines = []; 
        let apiInstance = null;
        let authToken = null; 
        let currentProject = null; 
        const statusBanner = document.getElementById("statusBanner");

        function getApiBaseUrl() {
            const ref = document.referrer || "";
            if (ref.includes("web21") || ref.includes("eu") || ref.includes("europe")) {
                return "https://app21.connect.trimble.com/tc/api/2.0";
            } else if (ref.includes("web22") || ref.includes("uk")) {
                return "https://app22.connect.trimble.com/tc/api/2.0";
            } else if (ref.includes("web31") || ref.includes("ap") || ref.includes("asia")) {
                return "https://app31.connect.trimble.com/tc/api/2.0";
            } else if (ref.includes("web32")) {
                return "https://app32.connect.trimble.com/tc/api/2.0";
            }
            return "https://app.connect.trimble.com/tc/api/2.0";
        }

        async function initExtension() {
            try {
                const TrimbleSDK = window.TrimbleConnectWorkspace || window.TrimbleConnectWorkspaceAPI;
                if (!TrimbleSDK) throw new Error("Trimble SDK library failed to load from CDN.");
                
                apiInstance = await TrimbleSDK.connect(window.parent, (event, args) => {
                    if (event === "extension.accessToken" && args && args.data) {
                        authToken = args.data; 
                    }
                }, 30000);
                
                statusBanner.innerText = "Status: Authenticating cloud access permissions...";
                statusBanner.style.background = "#0288d1";
                statusBanner.style.color = "white";
                
                authToken = await apiInstance.extension.requestPermission("accesstoken");
                currentProject = await apiInstance.project.getProject();
                
                // UNIT DETECTION ENGINE: Asynchronously fetch active project settings context
                try {
                    const settings = await apiInstance.project.getSettings(); // Pull formatting layout rules
                    if (settings) {
                        let detected = "";
                        if (settings.formatting && settings.formatting.lengthUnit) {
                            detected = settings.formatting.lengthUnit;
                        } else if (settings.lengthUnit) {
                            detected = settings.lengthUnit;
                        } else if (settings.unit) {
                            detected = settings.unit;
                        }

                        if (detected) {
                            detected = detected.toLowerCase();
                            // Standardize variable patterns to match our option nodes
                            if (detected.includes("millimeter") || detected === "mm") document.getElementById("unitSelect").value = "mm";
                            else if (detected.includes("us") || detected.includes("survey") || detected === "usft") document.getElementById("unitSelect").value = "usft";
                            else if (detected.includes("inch") || detected === "in") document.getElementById("unitSelect").value = "in";
                            else if (detected.includes("meter") || detected === "m") document.getElementById("unitSelect").value = "m";
                            else if (detected.includes("foot") || detected.includes("feet") || detected === "ft") document.getElementById("unitSelect").value = "ft";
                        }
                    }
                } catch (unitErr) {
                    console.warn("Project baseline units unreachable, falling back to option list rules.", unitErr);
                }

                updateTableUI();
                statusBanner.innerText = "Status: Connected to Viewer! Ready.";
                statusBanner.style.background = "#d4edda";
                statusBanner.style.color = "#155724";
            } catch (error) {
                statusBanner.innerText = "Connection Error: " + error.message;
                statusBanner.style.background = "#f8d7da";
                statusBanner.style.color = "#721c24";
            }
        }
