<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PNEZD Survey & DXF Scraper</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 12px; background: #fdfdfd; color: #333; margin: 0; }
        h3 { margin-top: 0; color: #007bc4; font-size: 16px; margin-bottom: 8px; }
        #statusBanner { font-size: 12px; font-weight: bold; padding: 8px; border-radius: 4px; margin-bottom: 12px; background: #0288d1; color: white; }
        
        /* Optimized Responsive Config Panel Layout */
        .config-container { background: #f0f4f8; padding: 10px; border-radius: 4px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .config-group { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .config-group label { font-size: 11px; font-weight: bold; color: #34495e; }
        .config-group select, .config-group input { padding: 5px; font-size: 12px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; width: 55%; }
        
        .actions { margin-bottom: 12px; display: flex; gap: 6px; }
        button { background: #0288d1; color: white; border: none; padding: 8px 6px; cursor: pointer; border-radius: 4px; font-weight: bold; flex: 1; font-size: 11px; }
        button:hover { background: #01579b; }
        button.success { background: #2e7d32; }
        button.success:hover { background: #1b5e20; }
        button.cad { background: #e65100; }
        button.cad:hover { background: #b53f00; }
        
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; font-size: 11px; }
        th { background-color: #f4f4f4; font-weight: bold; }
    </style>
</head>
<body>

    <h3>PNEZD Layout Scraper</h3>
    <div id="statusBanner">Status: Connecting to Trimble Connect API...</div>
    
    <div class="config-container">
        <div class="config-group">
            <label for="unitSelect">Target Unit</label>
            <select id="unitSelect" onchange="handleConfigChange()">
                <option value="mm">Millimeters (mm)</option>
                <option value="m">Meters (m)</option>
                <option value="in">Inches (in)</option>
                <option value="ft">International Feet (ft)</option>
                <option value="usft" selected>US Survey Feet (USft)</option>
            </select>
        </div>
        <div class="config-group">
            <label for="orderSelect">Coordinate Format</label>
            <select id="orderSelect" onchange="handleConfigChange()">
                <option value="NEZ" selected>NEZ (Northing, Easting, Z)</option>
                <option value="ENZ">ENZ (Easting, Northing, Z)</option>
            </select>
        </div>
        <div class="config-group">
            <label for="ptPrefix">Point Prefix</label>
            <input type="text" id="ptPrefix" value="P-" oninput="handleConfigChange()">
        </div>
        <div class="config-group">
            <label for="ptStart">Start ID #</label>
            <input type="number" id="ptStart" value="100" oninput="handleConfigChange()">
        </div>
        <div class="config-group">
            <label for="ptDesc">Fallback Desc</label>
            <input type="text" id="ptDesc" value="STAKE OUT" oninput="handleConfigChange()">
        </div>
    </div>

    <div class="actions">
        <button id="scrapeBtn" onclick="handleScrapeClick()">Scrape Data</button>
        <button id="exportBtn" class="success" onclick="handleExportClick()">Export CSV</button>
        <button id="exportDxfBtn" class="cad" onclick="handleDxfExportClick()">Export DXF</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Point ID (P)</th>
                    <th id="thCol1">Northing - Y</th>
                    <th id="thCol2">Easting - X</th>
                    <th id="thCol3">Elevation - Z</th>
                    <th>Description (D)</th>
                </tr>
            </thead>
            <tbody id="pointTableBody">
                <tr><td colspan="5" style="text-align:center; color:#999;">No data scraped yet. Place measurements and click Scrape.</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let rawScrapedData = []; 
        let rawScrapedLines = []; // Dedicated structural array tracking 3D CAD line entities
        let apiInstance = null;
        const statusBanner = document.getElementById("statusBanner");

        async function initExtension() {
            try {
                const TrimbleSDK = window.TrimbleConnectWorkspace || window.TrimbleConnectWorkspaceAPI;
                if (!TrimbleSDK) throw new Error("Trimble SDK library failed to load from CDN.");
                
                apiInstance = await TrimbleSDK.connect(window.parent, (event, args) => {}, 30000);
                
                statusBanner.innerText = "Status: Connected to Viewer! Ready.";
                statusBanner.style.background = "#d4edda";
                statusBanner.style.color = "#155724";
            } catch (error) {
                statusBanner.innerText = "Connection Error: " + error.message;
                statusBanner.style.background = "#f8d7da";
                statusBanner.style.color = "#721c24";
            }
        }

        function resolveRawMM(pt) {
            if (!pt) return { x: 0, y: 0, z: 0 };
            if (pt.positionX !== undefined && pt.positionX !== null) return { x: pt.positionX, y: pt.positionY, z: pt.positionZ };
            if (pt.position && pt.position.x !== undefined) return { x: pt.position.x, y: pt.position.y, z: pt.position.z };
            if (pt.position && pt.position.positionX !== undefined) return { x: pt.position.positionX, y: pt.position.positionY, z: pt.position.positionZ };
            if (pt.pick && pt.pick.positionX !== undefined) return { x: pt.pick.positionX, y: pt.pick.positionY, z: pt.pick.positionZ };
            if (pt.pick && pt.pick.x !== undefined) return { x: pt.pick.x, y: pt.pick.y, z: pt.pick.z };
            if (pt.point && pt.point.x !== undefined) return { x: pt.point.x, y: pt.point.y, z: pt.point.z };
            if (pt.point && pt.point.positionX !== undefined) return { x: pt.point.positionX, y: pt.point.positionY, z: pt.point.positionZ };
            if (pt.start && pt.start.positionX !== undefined) return { x: pt.start.positionX, y: pt.start.positionY, z: pt.start.positionZ };
            if (pt.x !== undefined && pt.x !== null) return { x: pt.x, y: pt.y, z: pt.z };

            for (let key in pt) {
                if (pt[key] && typeof pt[key] === 'object') {
                    let sub = pt[key];
                    if (sub.positionX !== undefined) return { x: sub.positionX, y: sub.positionY, z: sub.positionZ };
                    if (sub.x !== undefined) return { x: sub.x, y: sub.y, z: sub.z };
                }
            }
            return { x: 0, y: 0, z: 0 };
        }

        // Multi-layered analyzer capturing 3D endpoint geometry variants across line styles
        function resolveLineCoords(meas) {
            if (meas.start && meas.end) {
                return { start: resolveRawMM(meas.start), end: resolveRawMM(meas.end) };
            }
            if (meas.positionX !== undefined && meas.position2X !== undefined) {
                return {
                    start: { x: meas.positionX, y: meas.positionY, z: meas.positionZ },
                    end: { x: meas.position2X, y: meas.position2Y, z: meas.position2Z }
                };
            }
            if (meas.pick && meas.pick.positionX !== undefined && meas.pick.position2X !== undefined) {
                return {
                    start: { x: meas.pick.positionX, y: meas.pick.positionY, z: meas.pick.positionZ },
                    end: { x: meas.pick.position2X, y: meas.pick.position2Y, z: meas.pick.position2Z }
                };
            }
            return null;
        }

        async function handleScrapeClick() {
            if (!apiInstance || !apiInstance.markup) {
                alert("Extension handshake incomplete.");
                return;
            }
            try {
                rawScrapedData = []; 
                rawScrapedLines = [];

                const singlePoints = await apiInstance.markup.getSinglePointMarkups();
                const linearMeasurements = await apiInstance.markup.getMeasurementMarkups();
                const lineMarkups = await apiInstance.markup.getLineMarkups(); // Pulls freehand vector line markups
                const textMarkups = await apiInstance.markup.getTextMarkups();

                if (singlePoints && singlePoints.length > 0) {
                    singlePoints.forEach((pt) => {
                        let mmCoords = resolveRawMM(pt);
                        rawScrapedData.push({ xMm: mmCoords.x, yMm: mmCoords.y, zMm: mmCoords.z, type: "point" });
                    });
                }

                // Compile measurement lines and line markups together
                let lineSources = [];
                if (linearMeasurements && linearMeasurements.length > 0) lineSources.push(...linearMeasurements);
                if (lineMarkups && lineMarkups.length > 0) lineSources.push(...lineMarkups);

                if (lineSources.length > 0) {
                    lineSources.forEach((meas) => {
                        let lineCoords = resolveLineCoords(meas);
                        if (lineCoords) {
                            let dx = lineCoords.end.x - lineCoords.start.x;
                            let dy = lineCoords.end.y - lineCoords.start.y;
                            let dz = lineCoords.end.z - lineCoords.start.z;
                            let calcLengthMm = Math.sqrt(dx*dx + dy*dy + dz*dz);

                            rawScrapedData.push({ xMm: lineCoords.start.x, yMm: lineCoords.start.y, zMm: lineCoords.start.z, type: "line", lineLenMm: calcLengthMm });
                            rawScrapedData.push({ xMm: lineCoords.end.x, yMm: lineCoords.end.y, zMm: lineCoords.end.z, type: "line", lineLenMm: calcLengthMm });
                            
                            rawScrapedLines.push({ start: lineCoords.start, end: lineCoords.end, lineLenMm: calcLengthMm });
                        }
                    });
                }

                if (textMarkups && textMarkups.length > 0) {
                    textMarkups.forEach((tm) => {
                        let mmCoords = resolveRawMM(tm);
                        let typedText = tm.text || tm.content || tm.string || tm.value || "";
                        rawScrapedData.push({ xMm: mmCoords.x, yMm: mmCoords.y, zMm: mmCoords.z, type: "text", customDesc: typedText.trim() });
                    });
                }

                updateTableUI();
                if (rawScrapedData.length === 0) {
                    alert("Found 0 active objects or text markups on screen.");
                } else {
                    statusBanner.innerText = `Status: Scraped ${rawScrapedData.length} records successfully.`;
                    statusBanner.style.background = "#d4edda";
                    statusBanner.style.color = "#155724";
                }
            } catch (err) {
                alert("Scraper error: " + err.message);
            }
        }

        function convertValue(valInMm, targetUnit) {
            let num = parseFloat(valInMm);
            if (isNaN(num)) return "0.000";
            switch(targetUnit) {
                case "m":    return (num / 1000).toFixed(3);
                case "in":   return (num / 25.4).toFixed(2);
                case "ft":   return (num / 304.8).toFixed(3);
                case "usft": return (num / 304.8006096).toFixed(3);
                case "mm":
                default:     return num.toFixed(1);
            }
        }

        function updateTableUI() {
            const tbody = document.getElementById("pointTableBody");
            const currentUnit = document.getElementById("unitSelect").value;
            const formatOrder = document.getElementById("orderSelect").value;
            const prefix = document.getElementById("ptPrefix").value;
            let startNum = parseInt(document.getElementById("ptStart").value) || 1;
            const fallbackDescription = document.getElementById("ptDesc").value;
            
            if (formatOrder === "NEZ") {
                document.getElementById("thCol1").innerText = `Northing - Y (${currentUnit})`;
                document.getElementById("thCol2").innerText = `Easting - X (${currentUnit})`;
            } else {
                document.getElementById("thCol1").innerText = `Easting - X (${currentUnit})`;
                document.getElementById("thCol2").innerText = `Northing - Y (${currentUnit})`;
            }
            document.getElementById("thCol3").innerText = `Elevation - Z (${currentUnit})`;

            tbody.innerHTML = "";
            if (rawScrapedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">No measurements scraped yet.</td></tr>`;
                return;
            }

            rawScrapedData.forEach((pt, index) => {
                let pointNumber = prefix + (startNum + index);
                let northing = convertValue(pt.yMm, currentUnit);
                let easting = convertValue(pt.xMm, currentUnit);
                let elevation = convertValue(pt.zMm, currentUnit);

                let col1Value = (formatOrder === "NEZ") ? northing : easting;
                let col2Value = (formatOrder === "NEZ") ? easting : northing;
                
                let pointDescription = fallbackDescription;
                if (pt.type === "line" && pt.lineLenMm !== undefined) {
                    pointDescription = `Line: ${convertValue(pt.lineLenMm, currentUnit)} ${currentUnit}`;
                } else if (pt.type === "text" && pt.customDesc) {
                    pointDescription = `Markup: ${pt.customDesc}`;
                }

                tbody.innerHTML += `<tr><td><b>${pointNumber}</b></td><td>${col1Value}</td><td>${col2Value}</td><td>${elevation}</td><td>${pointDescription}</td></tr>`;
            });
        }

        function handleConfigChange() {
            updateTableUI();
        }

        function handleExportClick() {
            if (rawScrapedData.length === 0) return alert("Nothing to export! Scrape first.");
            try {
                const currentUnit = document.getElementById("unitSelect").value;
                const formatOrder = document.getElementById("orderSelect").value;
                const prefix = document.getElementById("ptPrefix").value;
                let startNum = parseInt(document.getElementById("ptStart").value) || 1;
                const fallbackDescription = document.getElementById("ptDesc").value;

                let csvString = formatOrder === "NEZ" ? 
                    `Point Number,Northing (${currentUnit}),Easting (${currentUnit}),Elevation (${currentUnit}),Description\n` :
                    `Point Number,Easting (${currentUnit}),Northing (${currentUnit}),Elevation (${currentUnit}),Description\n`;
                
                rawScrapedData.forEach((pt, index) => {
                    let pointNumber = prefix + (startNum + index);
                    let northing = convertValue(pt.yMm, currentUnit);
                    let easting = convertValue(pt.xMm, currentUnit);
                    let elevation = convertValue(pt.zMm, currentUnit);
                    let val1 = (formatOrder === "NEZ") ? northing : easting;
                    let val2 = (formatOrder === "NEZ") ? easting : northing;
                    
                    let pointDescription = fallbackDescription;
                    if (pt.type === "line" && pt.lineLenMm !== undefined) {
                        pointDescription = `Line: ${convertValue(pt.lineLenMm, currentUnit)} ${currentUnit}`;
                    } else if (pt.type === "text" && pt.customDesc) {
                        pointDescription = `Markup: ${pt.customDesc}`;
                    }
                    csvString += `"${pointNumber}",${val1},${val2},${elevation},"${pointDescription}"\n`;
                });

                const blob = new Blob([csvString], { type: "text/csv;charset=utf-8;" });
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", blobUrl);
                link.setAttribute("download", `scraped_${formatOrder.toLowerCase()}_${currentUnit}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            } catch (err) {
                alert("Export error: " + err.message);
            }
        }

        // Dedicated Mathematical CAD 3D DXF String Builder
        function handleDxfExportClick() {
            if (rawScrapedData.length === 0) {
                alert("Nothing to export! Place measurements on screen and click Scrape first.");
                return;
            }
            try {
                const currentUnit = document.getElementById("unitSelect").value;
                const prefix = document.getElementById("ptPrefix").value;
                let startNum = parseInt(document.getElementById("ptStart").value) || 1;

                let dxf = [];
                dxf.push("0\nSECTION\n2\nHEADER\n0\nENDSEC");
                dxf.push("0\nSECTION\n2\nENTITIES");

                // 1. Output every point node as a DXF POINT entity
                rawScrapedData.forEach((pt, index) => {
                    let cx = convertValue(pt.xMm, currentUnit); // X Axis always maps to CAD X
                    let cy = convertValue(pt.yMm, currentUnit); // Y Axis always maps to CAD Y
                    let cz = convertValue(pt.zMm, currentUnit); // Z Axis always maps to CAD Z

                    dxf.push("0\nPOINT");
                    dxf.push("8\nSURVEY_POINTS"); // Organized Layer Name
                    dxf.push(`10\n${cx}`);
                    dxf.push(`20\n${cy}`);
                    dxf.push(`30\n${cz}`);
                });

                // 2. Output every dimension/line markup segment as a DXF LINE entity
                rawScrapedLines.forEach((line) => {
                    let sx = convertValue(line.start.x, currentUnit);
                    let sy = convertValue(line.start.y, currentUnit);
                    let sz = convertValue(line.start.z, currentUnit);
                    
                    let ex = convertValue(line.end.x, currentUnit);
                    let ey = convertValue(line.end.y, currentUnit);
                    let ez = convertValue(line.end.z, currentUnit);

                    dxf.push("0\nLINE");
                    dxf.push("8\nSURVEY_LINES"); // Organized Layer Name
                    dxf.push(`10\n${sx}`); // Start X
                    dxf.push(`20\n${sy}`); // Start Y
                    dxf.push(`30\n${sz}`); // Start Z
                    dxf.push(`11\n${ex}`); // End X
                    dxf.push(`21\n${ey}`); // End Y
                    dxf.push(`31\n${ez}`); // End Z
                });

                dxf.push("0\nENDSEC\n0\nEOF\n");
                let dxfString = dxf.join("\n");

                const blob = new Blob([dxfString], { type: "application/dxf" });
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", blobUrl);
                link.setAttribute("download", `scraped_layout_${currentUnit}.dxf`);
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);

            } catch (err) {
                alert("DXF Export crash error: " + err.message);
            }
        }

        initExtension();
    </script>
</body>
</html>
