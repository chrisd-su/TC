<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Point Scraper</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #fdfdfd; color: #333; }
        h3 { margin-top: 0; color: #007bc4; margin-bottom: 5px; }
        #statusBanner { font-size: 12px; font-weight: bold; padding: 6px; border-radius: 4px; margin-bottom: 15px; background: #eee; color: #666; }
        .actions { margin-bottom: 15px; display: flex; gap: 10px; }
        button { background: #0288d1; color: white; border: none; padding: 10px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #01579b; }
        button.success { background: #2e7d32; }
        button.success:hover { background: #1b5e20; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h3>Screen Measurement Scraper</h3>
    <div id="statusBanner">Status: Waiting for initialization...</div>
    
    <div class="actions">
        <button id="scrapeBtn">Scrape All Screen Measurements</button>
        <button id="exportBtn" class="success">Export CSV</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Measurement ID / Type</th>
                <th>X (mm)</th>
                <th>Y (mm)</th>
                <th>Z (mm)</th>
            </tr>
        </thead>
        <tbody id="pointTableBody">
            <tr><td colspan="4" style="text-align:center; color:#999;">No measurements scraped yet. Placed native measurements on screen and click Scrape.</td></tr>
        </tbody>
    </table>

    <script>
        let scrapedPoints = [];
        let apiInstance = null;
        const statusDiv = document.getElementById("statusBanner");

        async function initExtension() {
            try {
                const TrimbleSDK = window.TrimbleConnectWorkspace || window.TrimbleConnectWorkspaceAPI;
                if (!TrimbleSDK) throw new Error("Trimble SDK failed to bind.");

                apiInstance = await TrimbleSDK.connect(window.parent, (event, args) => {}, 30000);

                statusDiv.innerText = "Status: Connected to Viewer! Ready to scrape.";
                statusDiv.style.background = "#d4edda";
                statusDiv.style.color = "#155724";
            } catch (error) {
                statusDiv.innerText = "Connection Failed: " + error.message;
                statusDiv.style.background = "#f8d7da";
                statusDiv.style.color = "#721c24";
            }
        }

        // Core Scraper Engine
        document.getElementById("scrapeBtn").addEventListener("click", async () => {
            if (!apiInstance || !apiInstance.markup) {
                alert("Extension markup engine is not fully initialized.");
                return;
            }

            try {
                scrapedPoints = []; // Reset old data entries
                
                // 1. Fetch native Single Point coordinates on screen
                const singlePoints = await apiInstance.markup.getSinglePointMarkups();
                
                // 2. Fetch standard Dimension Line / Distance strings on screen
                const linearMeasurements = await apiInstance.markup.getMeasurementMarkups();

                // Process Single Point measurements
                if (singlePoints && singlePoints.length > 0) {
                    singlePoints.forEach((pt, index) => {
                        // Trimble markup positions return natively in millimeters
                        let posX = pt.positionX ?? (pt.position ? pt.position.x : 0);
                        let posY = pt.positionY ?? (pt.position ? pt.position.y : 0);
                        let posZ = pt.positionZ ?? (pt.position ? pt.position.z : 0);

                        scrapedPoints.push({
                            name: `Coordinate Point ${pt.id || index + 1}`,
                            x: parseFloat(posX).toFixed(1),
                            y: parseFloat(posY).toFixed(1),
                            z: parseFloat(posZ).toFixed(1)
                        });
                    });
                }

                // Process Linear Dimension lines (grabs start and end vectors of your measurements)
                if (linearMeasurements && linearMeasurements.length > 0) {
                    linearMeasurements.forEach((meas, index) => {
                        if (meas.start) {
                            scrapedPoints.push({
                                name: `Dim Line ${meas.id || index + 1} (Start)`,
                                x: parseFloat(meas.start.positionX).toFixed(1),
                                y: parseFloat(meas.start.positionY).toFixed(1),
                                z: parseFloat(meas.start.positionZ).toFixed(1)
                            });
                        }
                        if (meas.end) {
                            scrapedPoints.push({
                                name: `Dim Line ${meas.id || index + 1} (End)`,
                                x: parseFloat(meas.end.positionX).toFixed(1),
                                y: parseFloat(meas.end.positionY).toFixed(1),
                                z: parseFloat(meas.end.positionZ).toFixed(1)
                            });
                        }
                    });
                }

                updateTableUI();

                if (scrapedPoints.length === 0) {
                    alert("Scrape complete, but found 0 active measurements on your screen. Drop some measurement points first!");
                } else {
                    statusDiv.innerText = `Status: Successfully scraped ${scrapedPoints.length} point coordinates!`;
                }

            } catch (err) {
                console.error("Scraper crash details:", err);
                alert("Error while executing screen scrape check console logs.");
            }
        });

        function updateTableUI() {
            const tbody = document.getElementById("pointTableBody");
            tbody.innerHTML = "";
            
            if (scrapedPoints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">No measurements scraped yet.</td></tr>`;
                return;
            }

            scrapedPoints.forEach(pt => {
                tbody.innerHTML += `<tr><td><b>${pt.name}</b></td><td>${pt.x}</td><td>${pt.y}</td><td>${pt.z}</td></tr>`;
            });
        }

        document.getElementById("exportBtn").addEventListener("click", () => {
            if (scrapedPoints.length === 0) return alert("No scraped coordinates found to export.");
            
            let csvContent = "data:text/csv;charset=utf-8,Point Name,X (mm),Y (mm),Z (mm)\n";
            scrapedPoints.forEach(pt => {
                csvContent += `"${pt.name}",${pt.x},${pt.y},${pt.z}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "scraped_trimble_measurements.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        initExtension();
    </script>
</body>
</html>
