<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Point Logger</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #fdfdfd; color: #333; }
        h3 { margin-top: 0; color: #007bc4; }
        .actions { margin-bottom: 15px; display: flex; gap: 10px; }
        button { background: #007bc4; color: white; border: none; padding: 10px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #005a92; }
        button.secondary { background: #666; }
        button.secondary:hover { background: #444; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h3>Point Logger Extension</h3>
    <p style="font-size: 13px; color: #666;">Select an object/vertex in the 3D Viewer, then click log.</p>
    
    <div class="actions">
        <button id="logBtn">Log Selected Point</button>
        <button id="exportBtn" class="secondary">Export CSV</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Label</th>
                <th>X (m)</th>
                <th>Y (m)</th>
                <th>Z (m)</th>
            </tr>
        </thead>
        <tbody id="pointTableBody">
            <tr><td colspan="4" style="text-align:center; color:#999;">No points logged yet.</td></tr>
        </tbody>
    </table>

    <script>
        let loggedPoints = [];
        let apiInstance = null;

        // Initialize handshake with the Trimble Connect 3D Viewer
        async function initExtension() {
            try {
                apiInstance = await TrimbleConnectWorkspaceAPI.connect(window.parent, (event, args) => {
                    // Triggers on native frame events if needed
                });
                console.log("Trimble Connect extension initialized successfully.");
            } catch (error) {
                console.error("Failed to connect to Trimble Workspace API:", error);
            }
        }

        // Logic to grab coordinates of whatever the user has highlighted
        document.getElementById("logBtn").addEventListener("click", async () => {
            if (!apiInstance) return alert("Extension not connected to viewer.");

            try {
                // 1. Get the current active user selection in the 3D window
                const selection = await apiInstance.viewer.getSelection();
                
                if (!selection || !selection.objectRuntimeIds || selection.objectRuntimeIds.length === 0) {
                    alert("Please select an object or vertex in the 3D Viewer first!");
                    return;
                }

                // 2. Query the viewer for the properties (including position vectors) of that object
                const objects = await apiInstance.viewer.getObjectProperties(selection.modelId, selection.objectRuntimeIds);
                
                if (objects && objects.length > 0 && objects[0].position) {
                    const pos = objects[0].position;
                    
                    // 3. Ask the user for a custom name/label
                    const label = prompt("Enter a label for this point:", `Point ${loggedPoints.length + 1}`) || "Unnamed Point";
                    
                    // 4. Save the coordinates (Trimble provides these in meters)
                    loggedPoints.push({
                        label: label,
                        x: pos.x.toFixed(3),
                        y: pos.y.toFixed(3),
                        z: pos.z.toFixed(3)
                    });
                    
                    updateTable();
                } else {
                    alert("Could not extract a geometric position for this object.");
                }
            } catch (err) {
                console.error(err);
                alert("Error capturing point coordinates.");
            }
        });

        // Update the HTML table UI
        function updateTable() {
            const tbody = document.getElementById("pointTableBody");
            tbody.innerHTML = "";
            loggedPoints.forEach(pt => {
                tbody.innerHTML += `<tr><td><b>${pt.label}</b></td><td>${pt.x}</td><td>${pt.y}</td><td>${pt.z}</td></tr>`;
            });
        }

        // Standard client-side CSV compiler and download trigger
        document.getElementById("exportBtn").addEventListener("click", () => {
            if (loggedPoints.length === 0) return alert("Nothing to export yet!");
            
            let csvContent = "data:text/csv;charset=utf-8,Label,X (meters),Y (meters),Z (meters)\n";
            loggedPoints.forEach(pt => {
                csvContent += `"${pt.label}",${pt.x},${pt.y},${pt.z}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "trimble_connect_measurements.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        initExtension();
    </script>
</body>
</html>
