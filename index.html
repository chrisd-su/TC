<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Point Logger</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #fdfdfd; color: #333; }
        h3 { margin-top: 0; color: #007bc4; margin-bottom: 5px; }
        #statusBanner { font-size: 12px; font-weight: bold; padding: 6px; border-radius: 4px; margin-bottom: 15px; background: #eee; color: #666; }
        .actions { margin-bottom: 15px; display: flex; gap: 10px; }
        button { background: #007bc4; color: white; border: none; padding: 10px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #005a92; }
        button.secondary { background: #666; }
        button.secondary:hover { background: #444; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h3>Point Logger Extension</h3>
    <div id="statusBanner">Status: Waiting for initialization...</div>
    
    <div class="actions">
        <button id="logBtn">Log Selected Point</button>
        <button id="exportBtn" class="secondary">Export CSV</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Label</th>
                <th>X (m)</th>
                <th>Y (m)</th>
                <th>Z (m)</th>
            </tr>
        </thead>
        <tbody id="pointTableBody">
            <tr><td colspan="4" style="text-align:center; color:#999;">No points logged yet.</td></tr>
        </tbody>
    </table>

    <script>
        let loggedPoints = [];
        let apiInstance = null;
        const statusDiv = document.getElementById("statusBanner");

        // Dynamic handshake launcher
        async function initExtension() {
            statusDiv.innerText = "Status: Connecting to Trimble Connect...";
            statusDiv.style.background = "#fff3cd";
            statusDiv.style.color = "#856404";

            try {
                // Resolves naming variance across different CDN builds robustly
                const TrimbleSDK = window.TrimbleConnectWorkspace || window.TrimbleConnectWorkspaceAPI;
                
                if (!TrimbleSDK) {
                    throw new Error("Trimble SDK library script failed to load from CDN.");
                }

                // Establish postMessage communication channel with Trimble Connect
                apiInstance = await TrimbleSDK.connect(window.parent, (event, args) => {
                    console.log("Trimble Event:", event, args);
                }, 30000); // 30-second handshake timeout limit

                statusDiv.innerText = "Status: Connected to Trimble Connect Successfully!";
                statusDiv.style.background = "#d4edda";
                statusDiv.style.color = "#155724";
            } catch (error) {
                console.error("Handshake Error:", error);
                statusDiv.innerText = "Connection Failed: " + error.message;
                statusDiv.style.background = "#f8d7da";
                statusDiv.style.color = "#721c24";
            }
        }

        document.getElementById("logBtn").addEventListener("click", async () => {
            if (!apiInstance) {
                alert("Extension is not connected to the viewer application yet.");
                return;
            }

            // Ensure the extension has access to the 3D Viewer module
            if (!apiInstance.viewer) {
                alert("Connected to Trimble Connect, but cannot find the 3D Viewer canvas. Ensure you are executing this inside a project tab where a 3D model is currently open.");
                return;
            }

            try {
                const selection = await apiInstance.viewer.getSelection();
                
                if (!selection || !selection.objectRuntimeIds || selection.objectRuntimeIds.length === 0) {
                    alert("Please select an object or vertex point on the 3D model first.");
                    return;
                }

                const objects = await apiInstance.viewer.getObjectProperties(selection.modelId, selection.objectRuntimeIds);
                
                if (objects && objects.length > 0 && objects[0].position) {
                    const pos = objects[0].position;
                    const label = prompt("Enter point label:", `Point ${loggedPoints.length + 1}`) || "Unnamed Point";
                    
                    loggedPoints.push({
                        label: label,
                        x: pos.x.toFixed(3),
                        y: pos.y.toFixed(3),
                        z: pos.z.toFixed(3)
                    });
                    
                    updateTable();
                } else {
                    alert("Unable to fetch explicit coordinates for this selection block.");
                }
            } catch (err) {
                console.error(err);
                alert("Error attempting to map coordinate vectors.");
            }
        });

        function updateTable() {
            const tbody = document.getElementById("pointTableBody");
            tbody.innerHTML = "";
            if(loggedPoints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">No points logged yet.</td></tr>`;
                return;
            }
            loggedPoints.forEach(pt => {
                tbody.innerHTML += `<tr><td><b>${pt.label}</b></td><td>${pt.x}</td><td>${pt.y}</td><td>${pt.z}</td></tr>`;
            });
        }

        document.getElementById("exportBtn").addEventListener("click", () => {
            if (loggedPoints.length === 0) return alert("No logged coordinate data found to export.");
            
            let csvContent = "data:text/csv;charset=utf-8,Label,X (meters),Y (meters),Z (meters)\n";
            loggedPoints.forEach(pt => {
                csvContent += `"${pt.label}",${pt.x},${pt.y},${pt.z}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "trimble_connect_measurements.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Initialize connection
        initExtension();
    </script>
</body>
</html>
