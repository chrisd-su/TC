<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trimble Markup Extractor</title>
    <script src="https://stg.connect.trimble.com/tc-workspace-api/bundle.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background-color: #f4f7f6; color: #333; }
        h3 { border-bottom: 2px solid #005a9c; padding-bottom: 5px; color: #005a9c; }
        .controls { margin-bottom: 15px; }
        button { background-color: #005a9c; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #004475; }
        #status { font-size: 0.85rem; margin-top: 5px; font-style: italic; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #eee; }
        .coord-label { font-weight: bold; color: #666; margin-right: 4px; }
        .type-badge { padding: 2px 6px; border-radius: 10px; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; }
        .badge-line { background: #e3f2fd; color: #1976d2; }
        .badge-meas { background: #f1f8e9; color: #388e3c; }
    </style>
</head>
<body>

    <h3>Markup Explorer</h3>
    
    <div class="controls">
        <button onclick="refreshMarkups()">Scan Viewport</button>
        <div id="status">Waiting for connection...</div>
    </div>

    <table id="markupTable">
        <thead>
            <tr>
                <th>Type</th>
                <th>Details / Coordinates (mm)</th>
            </tr>
        </thead>
        <tbody id="markupBody">
            </tbody>
    </table>

    <script>
        let viewerApi = null;

        // Initialize connection to Trimble Connect
        async function init() {
            try {
                const workspace = await window.TCHardware.connect();
                const project = await workspace.getCurrentProject();
                viewerApi = await project.getViewer();
                
                document.getElementById('status').innerText = "Connected to Viewer";
                document.getElementById('status').style.color = "green";
            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err.message;
                document.getElementById('status').style.color = "red";
            }
        }

        async function refreshMarkups() {
            if (!viewerApi) return;
            
            const status = document.getElementById('status');
            const tbody = document.getElementById('markupBody');
            
            status.innerText = "Scanning...";
            tbody.innerHTML = ""; // Clear existing rows

            try {
                const markups = await viewerApi.getMarkups();
                
                if (markups.length === 0) {
                    status.innerText = "No markups found in active view.";
                    return;
                }

                markups.forEach(m => {
                    const row = document.createElement('tr');
                    
                    // Format Type Badge
                    const badgeClass = m.type === 'line' ? 'badge-line' : 'badge-meas';
                    const typeTd = `<td><span class="type-badge ${badgeClass}">${m.type}</span></td>`;
                    
                    // Format Geometry Data
                    let detailHtml = "";
                    if (m.type === 'line') {
                        const { start, end } = m.geometry;
                        detailHtml = `
                            <div><span class="coord-label">Start:</span> ${start.x.toFixed(1)}, ${start.y.toFixed(1)}, ${start.z.toFixed(1)}</div>
                            <div><span class="coord-label">End:</span> ${end.x.toFixed(1)}, ${end.y.toFixed(1)}, ${end.z.toFixed(1)}</div>
                        `;
                    } else {
                        const pos = m.position || {x:0, y:0, z:0};
                        detailHtml = `
                            <div><span class="coord-label">Value:</span> ${m.value || 'N/A'}</div>
                            <div><span class="coord-label">Pos:</span> ${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}</div>
                        `;
                    }

                    row.innerHTML = `${typeTd}<td>${detailHtml}</td>`;
                    tbody.appendChild(row);
                });

                status.innerText = `Found ${markups.length} markups.`;
            } catch (err) {
                status.innerText = "Fetch failed: " + err.message;
            }
        }

        // Start initialization
        init();
    </script>
</body>
</html>
