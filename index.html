<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Point Scraper - Diagnostic Build</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 15px; background: #fdfdfd; color: #333; }
        h3 { margin-top: 0; color: #007bc4; margin-bottom: 5px; }
        #statusBanner { font-size: 12px; font-weight: bold; padding: 6px; border-radius: 4px; margin-bottom: 15px; background: #eee; color: #666; }
        .actions { margin-bottom: 15px; display: flex; gap: 10px; }
        button { background: #0288d1; color: white; border: none; padding: 10px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #01579b; }
        button.success { background: #2e7d32; }
        button.success:hover { background: #1b5e20; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 12px; }
        th { background-color: #f4f4f4; }
        .debug-data { font-family: monospace; font-size: 10px; color: #555; background: #f9f9f9; max-width: 300px; overflow-x: auto; display: block; white-space: nowrap; }
    </style>
</head>
<body>

    <h3>Screen Measurement Scraper (Diagnostic Build)</h3>
    <div id="statusBanner">Status: Connected to Viewer! Ready to scrape.</div>
    
    <div class="actions">
        <button id="scrapeBtn">Scrape Screen Measurements</button>
        <button id="exportBtn" class="success">Export CSV</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Point ID / Name</th>
                <th>X (mm)</th>
                <th>Y (mm)</th>
                <th>Z (mm)</th>
                <th>Raw API Structure (Diagnostic)</th>
            </tr>
        </thead>
        <tbody id="pointTableBody">
            <tr><td colspan="5" style="text-align:center; color:#999;">No data scraped yet. Place measurements and click Scrape.</td></tr>
        </tbody>
    </table>

    <script>
        let scrapedPoints = [];
        let apiInstance = null;
        const statusDiv = document.getElementById("statusBanner");

        async function initExtension() {
            try {
                const TrimbleSDK = window.TrimbleConnectWorkspace || window.TrimbleConnectWorkspaceAPI;
                if (!TrimbleSDK) throw new Error("Trimble SDK failed to bind.");
                apiInstance = await TrimbleSDK.connect(window.parent, (event, args) => {}, 30000);
                statusDiv.innerText = "Status: Connected to Viewer! Ready to scrape.";
                statusDiv.style.background = "#d4edda";
                statusDiv.style.color = "#155724";
            } catch (error) {
                statusDiv.innerText = "Connection Failed: " + error.message;
                statusDiv.style.background = "#f8d7da";
                statusDiv.style.color = "#721c24";
            }
        }

        // Deep property investigator to pull coordinates wherever they are hidden
        function resolveCoordinates(pt) {
            // Option A: Direct properties (positionX, positionY, positionZ)
            if (pt.positionX !== undefined && pt.positionX !== null) return { x: pt.positionX, y: pt.positionY, z: pt.positionZ };
            
            // Option B: Nested position block (pt.position.x)
            if (pt.position && pt.position.x !== undefined) return { x: pt.position.x, y: pt.position.y, z: pt.position.z };
            if (pt.position && pt.position.positionX !== undefined) return { x: pt.position.positionX, y: pt.position.positionY, z: pt.position.positionZ };

            // Option C: Nested pick block (pt.pick.positionX) - common for single point picks
            if (pt.pick && pt.pick.positionX !== undefined) return { x: pt.pick.positionX, y: pt.pick.positionY, z: pt.pick.positionZ };
            if (pt.pick && pt.pick.x !== undefined) return { x: pt.pick.x, y: pt.pick.y, z: pt.pick.z };

            // Option D: Nested point/start blocks
            if (pt.point && pt.point.x !== undefined) return { x: pt.point.x, y: pt.point.y, z: pt.point.z };
            if (pt.point && pt.point.positionX !== undefined) return { x: pt.point.positionX, y: pt.point.positionY, z: pt.point.positionZ };
            if (pt.start && pt.start.positionX !== undefined) return { x: pt.start.positionX, y: pt.start.positionY, z: pt.start.positionZ };

            // Option E: Direct standard vector fallback (x, y, z)
            if (pt.x !== undefined && pt.x !== null) return { x: pt.x, y: pt.y, z: pt.z };

            // Option F: Fallback automated dictionary deep lookup
            for (let key in pt) {
                if (pt[key] && typeof pt[key] === 'object') {
                    let sub = pt[key];
                    if (sub.positionX !== undefined) return { x: sub.positionX, y: sub.positionY, z: sub.positionZ };
                    if (sub.x !== undefined) return { x: sub.x, y: sub.y, z: sub.z };
                }
            }

            return { x: null, y: null, z: null };
        }

        document.getElementById("scrapeBtn").addEventListener("click", async () => {
            if (!apiInstance || !apiInstance.markup) {
                alert("Extension markup engine is not fully initialized.");
                return;
            }

            try {
                scrapedPoints = []; 
                
                const singlePoints = await apiInstance.markup.getSinglePointMarkups();
                const linearMeasurements = await apiInstance.markup.getMeasurementMarkups();

                // Process Single Points with the deep coordinate resolver
                if (singlePoints && singlePoints.length > 0) {
                    singlePoints.forEach((pt, index) => {
                        let coords = resolveCoordinates(pt);
                        let rawString = JSON.stringify(pt); // Capture exact JSON structure

                        scrapedPoints.push({
                            name: `Coordinate Point ${pt.id || index + 1}`,
                            x: coords.x !== null ? parseFloat(coords.x).toFixed(1) : "Not Found",
                            y: coords.y !== null ? parseFloat(coords.y).toFixed(1) : "Not Found",
                            z: coords.z !== null ? parseFloat(coords.z).toFixed(1) : "Not Found",
                            raw: rawString
                        });
                    });
                }

                // Process Linear Dimensions
                if (linearMeasurements && linearMeasurements.length > 0) {
                    linearMeasurements.forEach((meas, index) => {
                        let rawString = JSON.stringify(meas);
                        if (meas.start) {
                            let startCoords = resolveCoordinates(meas.start);
                            scrapedPoints.push({
                                name: `Dim ${meas.id || index + 1} (Start)`,
                                x: startCoords.x !== null ? parseFloat(startCoords.x).toFixed(1) : "Not Found",
                                y: startCoords.y !== null ? parseFloat(startCoords.y).toFixed(1) : "Not Found",
                                z: startCoords.z !== null ? parseFloat(startCoords.z).toFixed(1) : "Not Found",
                                raw: rawString
                            });
                        }
                        if (meas.end) {
                            let endCoords = resolveCoordinates(meas.end);
                            scrapedPoints.push({
                                name: `Dim ${meas.id || index + 1} (End)`,
                                x: endCoords.x !== null ? parseFloat(endCoords.x).toFixed(1) : "Not Found",
                                y: endCoords.y !== null ? parseFloat(endCoords.y).toFixed(1) : "Not Found",
                                z: endCoords.z !== null ? parseFloat(endCoords.z).toFixed(1) : "Not Found",
                                raw: rawString
                            });
                        }
                    });
                }

                updateTableUI();

                if (scrapedPoints.length === 0) {
                    alert("No active point or line measurements found on screen.");
                } else {
                    statusDiv.innerText = `Status: Scraped ${scrapedPoints.length} entries. Check data outputs below.`;
                }

            } catch (err) {
                console.error(err);
                alert("Scraper error. Check console logs.");
            }
        });

        function updateTableUI() {
            const tbody = document.getElementById("pointTableBody");
            tbody.innerHTML = "";
            
            if (scrapedPoints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">No measurements scraped yet.</td></tr>`;
                return;
            }

            scrapedPoints.forEach(pt => {
                tbody.innerHTML += `
                    <tr>
                        <td><b>${pt.name}</b></td>
                        <td style="color: ${pt.x === 'Not Found' ? 'red' : 'green'}">${pt.x}</td>
                        <td style="color: ${pt.y === 'Not Found' ? 'red' : 'green'}">${pt.y}</td>
                        <td style="color: ${pt.z === 'Not Found' ? 'red' : 'green'}">${pt.z}</td>
                        <td><div class="debug-data">${pt.raw}</div></td>
                    </tr>`;
            });
        }

        document.getElementById("exportBtn").addEventListener("click", () => {
            if (scrapedPoints.length === 0) return alert("No data to export.");
            
            let csvContent = "data:text/csv;charset=utf-8,Point Name,X (mm),Y (mm),Z (mm)\n";
            scrapedPoints.forEach(pt => {
                csvContent += `"${pt.name}",${pt.x},${pt.y},${pt.z}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "diagnostic_measurements.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        initExtension();
    </script>
</body>
</html>
